<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>udf3x Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
       
        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background: url('assets/custom_cursor.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            left: -100px; /* start offscreen */
            top: -100px;
        }
       
        body:not(.touch-device) {
            cursor: none;
        }
        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #hacker-overlay, #snow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        .hidden {
            display: none !important;
        }
       
        .controls {
            position: fixed;
            bottom: calc(50% - 240px - 10px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .theme-button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        .theme-button:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }
       
        .volume-control, .transparency-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-icon, .transparency-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            color: white;
        }
        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }
       
        .top-controls {
            position: fixed;
            bottom: calc(50% - 240px - 60px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
       
        #profile-block, #skills-block {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 820px;
            min-height: 332px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #profile-block.visible, #skills-block.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
       
        /* rest of your CSS stays the same - I'm only showing changed/added parts here for brevity */
        /* ... paste all your original CSS below this line ... */
    </style>
</head>
<body class="home-theme">

    <div class="custom-cursor"></div>
   
    <div id="start-screen">
        <div id="start-text">Click anywhere to enter</div>
    </div>

    <div class="container">
        <video id="background" autoplay loop muted playsinline>
            <source src="assets/background.mp4" type="video/mp4">
        </video>
       
        <!-- your overlays, profile-block, skills-block, controls etc. stay exactly the same -->
        <!-- ... paste your original HTML content here ... -->

    </div>

    <audio id="background-music" loop>
        <source src="assets/background_music.mp3" type="audio/mp3">
    </audio>
    <!-- other audio elements stay the same -->

    <script>
        // ────────────────────────────────────────────────
        // FIXED & WORKING JAVASCRIPT - ALL IN ONE PLACE
        // ────────────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', () => {
            // Cursor
            const cursor = document.querySelector('.custom-cursor');
            let mouseX = 0, mouseY = 0;
            let cursorX = 0, cursorY = 0;
            const cursorSpeed = 0.14;

            function updateCursor() {
                cursorX += (mouseX - cursorX) * cursorSpeed;
                cursorY += (mouseY - cursorY) * cursorSpeed;
                cursor.style.left = cursorX + 'px';
                cursor.style.top  = cursorY + 'px';
                requestAnimationFrame(updateCursor);
            }
            document.addEventListener('mousemove', e => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            updateCursor();

            // Hide cursor on touch devices
            if ('ontouchstart' in window) {
                document.body.classList.add('touch-device');
            }

            // Start screen → remove on click + play music
            const startScreen = document.getElementById('start-screen');
            const bgMusic = document.getElementById('background-music');
            startScreen.addEventListener('click', () => {
                startScreen.style.opacity = '0';
                setTimeout(() => startScreen.classList.add('hidden'), 800);
                bgMusic.volume = 0.3;
                bgMusic.play().catch(() => {}); // autoplay may still need interaction
            });

            // Fade in profile block
            const profileBlock = document.getElementById('profile-block');
            setTimeout(() => {
                profileBlock.classList.add('visible');
            }, 400);

            // Animate skill bars (once visible)
            const skillsBlock = document.getElementById('skills-block');
            function animateSkills() {
                document.getElementById('python-bar').style.width = '87%';
                document.getElementById('cpp-bar').style.width    = '75%';
                document.getElementById('csharp-bar').style.width = '80%';
            }

            // If you ever show skills block (e.g. via theme or button), call animateSkills()
            // For now - if you want them shown immediately, uncomment:
            // skillsBlock.classList.remove('hidden');
            // skillsBlock.classList.add('visible');
            // animateSkills();

            // Volume slider
            const volumeSlider = document.getElementById('volume-slider');
            volumeSlider.addEventListener('input', () => {
                bgMusic.volume = volumeSlider.value;
            });

            // Transparency (example - affects profile block)
            const transSlider = document.getElementById('transparency-slider');
            transSlider.addEventListener('input', () => {
                const val = transSlider.value;
                profileBlock.style.background = `rgba(0, 0, 0, ${val})`;
                // you can do same for skillsBlock, controls etc.
            });

            // Theme buttons (basic - you can expand)
            document.querySelectorAll('.theme-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.body.className = btn.id + '-theme';
                    // add music switching, overlays etc. here later if needed
                });
            });
        });
    </script>
</body>
</html>
