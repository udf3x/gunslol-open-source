<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>udf3x Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Retro+Gaming&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background: url('assets/custom_cursor.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            left: -100px;
            top: -100px;
        }

        body:not(.touch-device) {
            cursor: none;
        }
        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #hacker-overlay, #snow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        .hidden {
            display: none !important;
        }

        .controls {
            position: fixed;
            bottom: calc(50% - 240px - 10px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .theme-button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        .theme-button:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .volume-control, .transparency-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-icon, .transparency-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            color: white;
        }
        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        .top-controls {
            position: fixed;
            bottom: calc(50% - 240px - 60px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        #profile-block, #skills-block {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.92);
            width: 820px;
            min-height: 332px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.8s ease;
        }

        #profile-block.visible, #skills-block.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        .profile-container {
            position: relative;
            width: 150px;
            height: 150px;
        }
        .profile-container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background: radial-gradient(circle at 10px 10px, var(--primary-color, #00CED1) 10%, transparent 15%);
            animation: orbit 3s linear infinite;
            z-index: -1;
            filter: blur(1px);
        }
        .profile-picture {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            opacity: 1 !important;
        }
        .profile-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .name-and-badges {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        @font-face {
            font-family: 'Angel Wish';
            src: url('assets/Angel_wish.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        #profile-name {
            font-family: 'Angel Wish', sans-serif;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #fff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
            opacity: 1 !important;
        }
        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge {
            width: 22px;
            height: 22px;
            transition: transform 0.3s;
            opacity: 1 !important;
        }
        .badge:hover {
            transform: scale(1.2);
        }
        #profile-bio {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 10px;
            opacity: 1 !important;
        }
        .bio-separator {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
            opacity: 1 !important;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 0;
            opacity: 1 !important;
        }
        .social-icon {
            width: 36px;
            height: 36px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
            opacity: 1 !important;
        }
        .social-icon:hover {
            transform: scale(1.4) rotateY(15deg);
        }

        .visitor-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            align-self: flex-start;
            opacity: 1 !important;
        }

        .skill {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .skill-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .skill-icon {
            width: 22px;
            height: 22px;
            margin-right: 8px;
        }
        .skill-bar-container {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        .skill-bar {
            height: 100%;
            border-radius: 5px;
            width: 0;
            transition: width 1.8s ease-out;
        }
        #python-bar { background: linear-gradient(90deg, #ff6b6b, #ff9f9f); }
        #cpp-bar    { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        #csharp-bar { background: linear-gradient(90deg, #43e97b, #38f9d7); }

        #start-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            cursor: pointer;
            transition: opacity 0.8s;
        }
        #start-text {
            font-size: 28px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        @keyframes orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 430px) {
            #profile-block, #skills-block {
                width: 90vw;
                max-width: 350px;
                min-height: 280px;
                padding: 15px;
            }
            .profile-header { flex-direction: column; align-items: center; }
            .profile-container { width: 120px; height: 120px; }
            .profile-picture { width: 120px; height: 120px; }
            #profile-name { font-size: 24px; }
            /* ... add more mobile adjustments if needed ... */
        }
    </style>
</head>
<body class="home-theme">

    <div class="custom-cursor"></div>

    <div id="start-screen">
        <div id="start-text">Click anywhere to enter</div>
    </div>

    <div class="container">

        <video id="background" autoplay loop muted playsinline>
            <source src="assets/background.mp4" type="video/mp4">
        </video>

        <div class="glitch-overlay"></div>
        <div id="hacker-overlay" class="hidden"></div>
        <div id="snow-overlay" class="hidden"></div>

        <div id="profile-block">
            <div class="profile-header">
                <div class="profile-container">
                    <img src="assets/profile.gif" alt="Profile" class="profile-picture">
                </div>
                <div class="profile-info">
                    <div class="name-and-badges">
                        <div id="profile-name">JAQLIV</div>
                        <div class="badge-box">
                            <div class="badge-box-inner">
                                <div class="badge-group">
                                    <img src="assets/staff.gif" alt="Staff" class="badge">
                                    <img src="assets/owner.gif" alt="Owner" class="badge">
                                    <img src="assets/partner.gif" alt="Partner" class="badge">
                                    <img src="assets/developer.png" alt="Developer" class="badge">
                                    <img src="assets/bug_bounty.gif" alt="Bug Bounty" class="badge">
                                    <!-- add tooltips back if you want -->
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="profile-bio">hacker | developer | motiongoats</div>
                </div>
            </div>
            <div class="bio-separator"></div>
            <div class="profile-footer">
                <div class="social-links">
                    <a href="https://discord.gg/motiongoats" target="_blank"><img src="assets/discord.png" class="social-icon" alt="Discord"></a>
                    <a href="https://github.com/JAQLIV" target="_blank"><img src="assets/github.png" class="social-icon" alt="GitHub"></a>
                    <a href="https://www.youtube.com/@jaqliv" target="_blank"><img src="assets/youtube.png" class="social-icon" alt="YouTube"></a>
                    <a href="https://www.tiktok.com/@jaqliv" target="_blank"><img src="assets/tiktok.png" class="social-icon" alt="TikTok"></a>
                </div>
                <div class="visitor-counter">
                    <span>👀</span> <span id="visitor-count">21234</span>
                </div>
            </div>
        </div>

        <div id="skills-block" class="hidden">
            <h2 class="skills-title">Programming Skills</h2>
            <div class="skill">
                <div class="skill-name"><img src="assets/python.png" class="skill-icon"> Python <span>87%</span></div>
                <div class="skill-bar-container"><div id="python-bar" class="skill-bar"></div></div>
            </div>
            <div class="skill">
                <div class="skill-name"><img src="assets/cpp.png" class="skill-icon"> C++ <span>75%</span></div>
                <div class="skill-bar-container"><div id="cpp-bar" class="skill-bar"></div></div>
            </div>
            <div class="skill">
                <div class="skill-name"><img src="assets/csharp.png" class="skill-icon"> C# <span>80%</span></div>
                <div class="skill-bar-container"><div id="csharp-bar" class="skill-bar"></div></div>
            </div>
        </div>

        <div class="controls">
            <div id="home-theme" class="theme-button">1</div>
            <div id="hacker-theme" class="theme-button">2</div>
            <div id="rain-theme" class="theme-button">3</div>
            <div id="anime-theme" class="theme-button">4</div>
            <div id="car-theme" class="theme-button">5</div>
        </div>

        <div class="top-controls">
            <div class="volume-control">
                <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                <input id="volume-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.3">
            </div>
            <div class="transparency-control">
                <svg class="transparency-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                <input id="transparency-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.7">
            </div>
        </div>

    </div>

    <audio id="background-music" loop>
        <source src="assets/background_music.mp3" type="audio/mp3">
    </audio>
    <!-- add your other audio files here if you want theme music switching -->

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ─── Cursor ────────────────────────────────────────
            const cursor = document.querySelector('.custom-cursor');
            let mx = 0, my = 0, cx = 0, cy = 0;
            const speed = 0.14;

            function tick() {
                cx += (mx - cx) * speed;
                cy += (my - cy) * speed;
                cursor.style.left = cx + 'px';
                cursor.style.top  = cy + 'px';
                requestAnimationFrame(tick);
            }

            window.addEventListener('mousemove', e => {
                mx = e.clientX;
                my = e.clientY;
            });

            tick();

            if ('ontouchstart' in window) document.body.classList.add('touch-device');

            // ─── Start Screen + Music ──────────────────────────
            const start = document.getElementById('start-screen');
            const music = document.getElementById('background-music');
            start.addEventListener('click', () => {
                start.style.opacity = '0';
                setTimeout(() => start.classList.add('hidden'), 900);
                music.volume = 0.3;
                music.play().catch(()=>{});
            });

            // ─── Profile Fade-in ───────────────────────────────
            setTimeout(() => {
                document.getElementById('profile-block').classList.add('visible');
            }, 300);

            // ─── Volume Slider ─────────────────────────────────
            document.getElementById('volume-slider').addEventListener('input', e => {
                music.volume = +e.target.value;
            });

            // ─── Transparency Slider (example) ─────────────────
            document.getElementById('transparency-slider').addEventListener('input', e => {
                const v = +e.target.value;
                document.getElementById('profile-block').style.background = `rgba(0,0,0,${v})`;
            });

            // ─── Theme Buttons (basic class switch) ────────────
            document.querySelectorAll('.theme-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.body.className = btn.id + '-theme';
                });
            });

            // ─── Skill bars animation (when shown) ─────────────
            // For now just demo - call this when you show #skills-block
            function fillSkills() {
                setTimeout(() => {
                    document.getElementById('python-bar').style.width = '87%';
                    document.getElementById('cpp-bar').style.width    = '75%';
                    document.getElementById('csharp-bar').style.width = '80%';
                }, 400);
            }
            // fillSkills();   ← uncomment if you want skills visible by default
        });
    </script>
</body>
</html>
